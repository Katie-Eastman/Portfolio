        <main class="container mt-5 flex-grow-1">

            <div id="contactDiv" class="row justify-content-center mb-5">
                <div class="col-md-6">
                    <div class="custom p-5 border border-primary rounded border-3 text-center">
                        <form onsubmit="confirmSubmit()" method="post" action="">
                            <h3 class="mb-4"><i class="fa-solid fa-envelope"></i> Contact Me Here</h3>
                            <div class="mb-3">
                                <label for="name" class="form-label">Name:</label>
                                <input type="text" placeholder="Jane Doe" class="form-control" id="name" name="name" pattern="^[A-za-z\s]{2,50}$" required>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">Email:</label>
                                <input type="email" placeholder="jdoe@example.com" class="form-control" id="email" name="email" pattern="^[^\s@]+@[^\s@]+\.[^\s@]+$" required>
                            </div>
                            <div class="mb-3">
                                <label for="reason" class="form-label">Reason for Contact:</label>
                                    <select class="form-select" id="reason" name="reason" required>
                                        <option value="">Choose one...</option>
                                        <option>Freelance Opportunity</option>
                                        <option>Employment Opportunity</option>
                                        <option>Question</option>
                                        <option>Other</option>
                                    </select>
                            </div>
                            <div class="mb-3">
                                <label for="details" class="form-label">Details:</label>
                                <textarea class="form-control" id="details" name="details" rows="5" pattern=".{10,1000}" required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary">Submit</button>
                        </form>
                    </div>
                   
                </div>
            </div>

        </main>
